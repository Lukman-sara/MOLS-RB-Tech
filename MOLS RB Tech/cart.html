<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keranjang Belanja Anda | MOLS RB Tech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cart.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    
    <header class="site-header">
        <div class="header-container">
            <a href="index.html" class="logo-brand">MOLS <span class="logo-rb">RB Tech</span></a>
            <nav class="main-nav">
                <ul>
                    <li><a href="products.html" class="nav-item">Lanjutkan Belanja</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container layout-cart">
        <section class="cart-items-section">
            <h2>Keranjang Belanja</h2>
            <div id="cart-table-wrapper">
                </div>
        </section>

        <aside class="cart-summary-box">
            <h3>Ringkasan Belanja</h3>
            <div class="summary-line">
                <span>Total Item</span>
                <span id="sum-items-qty">0 Barang</span>
            </div>
            <div class="summary-line">
                <span>Subtotal</span>
                <span id="sum-subtotal">Rp 0</span>
            </div>
            <div class="summary-line">
                <span>Pajak (PPN 11%)</span>
                <span id="sum-tax">Rp 0</span>
            </div>
            <hr class="divider">
            <div class="summary-line grand-total-line">
                <span>Total Pembayaran</span>
                <span id="sum-grandtotal" class="price-highlight">Rp 0</span>
            </div>
            <button id="btn-goto-checkout" class="btn btn-primary btn-checkout-action" style="width:100%; margin-top:1.5rem; padding:1rem;">
                Lanjut ke Checkout <i class="fa-solid fa-arrow-right"></i>
            </button>
        </aside>
    </main>

    <script src="js/products.data.js"></script>
    <script src="js/analytics.js"></script>
    <script src="js/app.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
