<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pengiriman & Checkout | MOLS RB Tech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/checkout.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    <header class="site-header">
        <div class="header-container">
            <a href="index.html" class="logo-brand">MOLS <span class="logo-rb">RB Tech</span></a>
        </div>
    </header>

    <main class="container layout-checkout">
        <section class="checkout-form-section">
            <h2>Detail Pengiriman Pelanggan</h2>
            <form id="checkout-form" novalidate class="form-container">
                <div class="form-group">
                    <label for="full-name">Nama Lengkap *</label>
                    <input type="text" id="full-name" required placeholder="Masukkan nama lengkap penerima">
                    <span class="error-msg" id="error-name">Nama tidak boleh kosong</span>
                </div>
                <div class="form-group">
                    <label for="email">Alamat Email Resmi *</label>
                    <input type="email" id="email" required placeholder="pembeli@domain.com">
                    <span class="error-msg" id="error-email">Format email tidak valid</span>
                </div>
                <div class="form-group">
                    <label for="phone-number">Nomor HP / WhatsApp *</label>
                    <input type="tel" id="phone-number" required placeholder="Contoh: 082124135338">
                    <span class="error-msg" id="error-phone">Nomor HP harus berisikan 10-13 digit angka asli</span>
                </div>
                <div class="form-group">
                    <label for="address">Alamat Rumah Lengkap *</label>
                    <textarea id="address" required placeholder="Nama jalan, nomor rumah, RT/RW, Kecamatan, Kelurahan"></textarea>
                    <span class="error-msg" id="error-address">Alamat pengiriman wajib ditulis detail</span>
                </div>
                <div class="grid-form-3col">
                    <div class="form-group">
                        <label for="city">Kota/Kabupaten *</label>
                        <input type="text" id="city" required>
                    </div>
                    <div class="form-group">
                        <label for="province">Provinsi *</label>
                        <input type="text" id="province" required>
                    </div>
                    <div class="form-group">
                        <label for="postal-code">Kode Pos *</label>
                        <input type="text" id="postal-code" required pattern="[0-9]{5}">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-submit-checkout">Konfirmasi Pengiriman & Lanjut Bayar</button>
            </form>
        </section>

        <aside class="checkout-review-sidebar">
            <h3>Review Item Belanja</h3>
            <div id="checkout-items-preview">
                </div>
            <div class="summary-totals" id="checkout-total-panel">
                </div>
        </aside>
    </main>

    <script src="js/products.data.js"></script>
    <script src="js/analytics.js"></script>
    <script src="js/app.js"></script>
    <script src="js/checkout.js"></script>
</body>
</html>
